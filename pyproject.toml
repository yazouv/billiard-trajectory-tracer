[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["build", "dist", ".venv", "venv", "captures"]

[tool.ruff.lint]
# Defaults (E, F) + quelques extras
select = ["E", "F", "W", "I", "UP", "B"]
ignore = [
    "E501",   # ligne longue : on a déjà line-length=100
    "B008",   # function call in argument defaults (utile pour PIL etc.)
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q"
