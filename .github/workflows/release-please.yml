name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-windows:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        run: python tools/make_icon.py

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm CABReplay.spec

      - name: Zip release
        shell: pwsh
        run: |
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          $zip = "CABReplay-$tag-win64.zip"
          Compress-Archive -Path dist/CABReplay/* -DestinationPath $zip
          "ARTIFACT=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" "${{ env.ARTIFACT }}" --clobber
        shell: pwsh
