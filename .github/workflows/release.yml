name: Release CABReplay

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        run: python tools/make_icon.py

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm CABReplay.spec

      - name: Zip release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "dev-$(Get-Date -Format yyyyMMdd-HHmmss)" }
          $zip = "CABReplay-$tag-win64.zip"
          Compress-Archive -Path dist/CABReplay/* -DestinationPath $zip
          "ARTIFACT=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: CABReplay-${{ github.ref_name }}-win64
          path: ${{ env.ARTIFACT }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          generate_release_notes: true
