name: Build CABReplay (manuel)

# Build manuel sans publier de release. Le build auto sur release est dans
# release-please.yml (l'event tag push declenche par GITHUB_TOKEN n'arme pas
# d'autres workflows). Garde ce workflow pour produire un artifact a la volee.

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        run: python tools/make_icon.py

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm CABReplay.spec

      - name: Zip
        shell: pwsh
        run: |
          $stamp = Get-Date -Format yyyyMMdd-HHmmss
          $zip = "CABReplay-dev-$stamp-win64.zip"
          Compress-Archive -Path dist/CABReplay/* -DestinationPath $zip
          "ARTIFACT=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v4
        with:
          name: CABReplay-dev-win64
          path: ${{ env.ARTIFACT }}
